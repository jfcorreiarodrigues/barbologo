name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # dispara automaticamente ao fazer merge/push para main
  workflow_dispatch:  # permite lançar manualmente pelo separador "Actions"

# Permissões necessárias para o deploy do Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy corre de cada vez; não cancela o que está em curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. BUILD ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 2. DEPLOY ───────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
